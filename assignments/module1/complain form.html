<script>
    class SubmissionViewer {

  constructor() {
    this.tableBody = document.getElementById("tableBody");
    this.searchInput = document.getElementById("searchInput");
    this.noData = document.getElementById("noData");

    this.data = JSON.parse(localStorage.getItem("customers")) || [];

    this.displayData(this.data);

    // 🔍 Search Event
    this.searchInput.addEventListener("input", () => {
      this.searchData();
    });
  }

  // ✅ Display Data
  displayData(data) {
    this.tableBody.innerHTML = "";

    if (data.length === 0) {
      this.noData.innerText = "No data found ❌";
      return;
    }

    this.noData.innerText = "";

    data.forEach(item => {
      this.tableBody.innerHTML += `
        <tr>
          <td>${item.name}</td>
          <td>${item.phone}</td>
          <td>${item.email}</td>
          <td>${item.checkin}</td>
          <td>${item.checkout}</td>
          <td>${item.adults}</td>
          <td>${item.purpose}</td>
        </tr>
      `;
    });
  }

  // ✅ Search Function
  searchData() {
    const value = this.searchInput.value.toLowerCase();

    const filtered = this.data.filter(item => 
      item.name.toLowerCase().includes(value) ||
      item.checkin.includes(value) ||
      item.checkout.includes(value)
    );

    this.displayData(filtered);
  }
}

// ✅ Initialize

export const getItem = (key) => {
  return JSON.parse(localStorage.getItem(key)) || [];
};

export const setItem = (key, data) => {
  localStorage.setItem(key, JSON.stringify(data));
};
import { getItem, setItem } from "./storage.js";

class ComplaintFormHandler {

  constructor(formId) {
    this.form = document.getElementById(formId);
    this.messageBox = document.getElementById("messageBox");

    // Submit (Event Delegation)
    this.form.addEventListener("submit", (e) => {
      e.preventDefault();

      if (this.validateForm()) {
        this.saveData();
        this.clearForm();
        this.showMessage("Complaint submitted successfully ✅", "success");
      }
    });

    // Real-time validation
    this.form.addEventListener("input", (e) => {
      this.validateField(e.target);
    });
  }

  // ✅ Show Message
  showMessage(msg, type) {
    this.messageBox.innerHTML = `
      <div class="alert alert-${type === "success" ? "success" : "danger"}">
        ${msg}
      </div>
    `;

    setTimeout(() => this.messageBox.innerHTML = "", 3000);
  }

  // ✅ Validate Single Field
  validateField(field) {
    const value = field.value.trim();

    switch (field.id) {
      case "name":
        if (value.length < 3) {
          this.showMessage("Name must be at least 3 characters", "error");
        }
        break;

      case "phone":
        if (!/^\d{10}$/.test(value)) {
          this.showMessage("Phone must be 10 digits", "error");
        }
        break;

      case "email":
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
          this.showMessage("Invalid email", "error");
        }
        break;

      case "complaint":
        if (value.length < 10) {
          this.showMessage("Complaint must be at least 10 characters", "error");
        }
        break;
    }
  }

  // ✅ Full Validation
  validateForm() {
    const name = this.form.name.value.trim();
    const phone = this.form.phone.value.trim();
    const email = this.form.email.value.trim();
    const complaint = this.form.complaint.value.trim();

    if (!name || !phone || !email || !complaint) {
      this.showMessage("All fields are required", "error");
      return false;
    }

    if (name.length < 3) {
      this.showMessage("Name must be at least 3 characters", "error");
      return false;
    }

    if (!/^\d{10}$/.test(phone)) {
      this.showMessage("Phone must be exactly 10 digits", "error");
      return false;
    }

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      this.showMessage("Invalid email format", "error");
      return false;
    }

    if (complaint.length < 10) {
      this.showMessage("Complaint must be at least 10 characters", "error");
      return false;
    }

    return true;
  }

  // ✅ Save to LocalStorage
  saveData() {
    const data = {
      name: this.form.name.value,
      phone: this.form.phone.value,
      email: this.form.email.value,
      complaint: this.form.complaint.value,
      date: new Date().toLocaleDateString()
    };

    const records = getItem("complaints");
    records.push(data);
    setItem("complaints", records);
  }

  // ✅ Clear Form
  clearForm() {
    this.form.reset();
  }
}

new ComplaintFormHandler("complaintForm");
